name: dotnet-release
on:
  push:
    tags: ['dotnet-v*']
permissions:
  contents: read
  id-token: write   # OIDC trusted publishing to nuget.org
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#dotnet-v}" >> "$GITHUB_ENV"
      - name: Test
        run: dotnet test dotnet/BrutalSystems.Realtime.slnx -c Release
      - name: Pack
        run: |
          dotnet pack dotnet/src/BrutalSystems.Realtime.Core   -c Release -p:PackageVersion="$VERSION" -o out
          dotnet pack dotnet/src/BrutalSystems.Realtime.Client -c Release -p:PackageVersion="$VERSION" -o out
      - name: NuGet login (OIDC → short-lived API key)
        uses: NuGet/login@v1
        id: login
        with:
          # nuget.org username (profile name, NOT email). Set as a repo secret.
          user: ${{ secrets.NUGET_USER }}
      - name: Publish to nuget.org
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
